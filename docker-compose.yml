services:
  postgres:
    image: postgres:16-alpine
    container_name: patron-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  patron-api:
    build: .
    container_name: el-patron-hn
    restart: unless-stopped
    ports:
      - "3001:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - patron-prod-data:/app/data

volumes:
  pgdata:
  patron-prod-data:

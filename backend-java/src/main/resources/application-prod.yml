spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      continue-on-error: true

app:
  swagger:
    enabled: false
  cookie:
    secure: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://patron.hn,http://localhost:3002,http://localhost:3001}
